spring.application.name=capstone2

# URL FOR DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/fixit


spring.datasource.username=root

spring.datasource.password=

# hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

####################
spring.jpa.show-sql=true

spring.jpa.generate-ddl=true

#create-drop كل ما شغلت السيرفر يسوي كرييت دروب
#اذا بينهم رليشن اخليه ابديتد
spring.jpa.hibernate.ddl-auto=create-drop

spring.web.error.include-message=always

spring.web.error.include-stacktrace=always
#Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${email}
spring.mail.password=${password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


